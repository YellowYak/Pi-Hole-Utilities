<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Podcast</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@300;400;500&family=IBM+Plex+Sans:wght@300;400;500&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0e0f11;
      --surface: #16181c;
      --border: #2a2d35;
      --text: #d4d8e2;
      --text-dim: #5a6070;
      --text-bright: #f0f2f7;
      --accent: #14b8a6;
      --accent-dim: rgba(20, 184, 166, 0.10);
      --success: #3dd68c;
      --success-dim: rgba(61, 214, 140, 0.12);
      --error: #ff5f57;
      --error-dim: rgba(255, 95, 87, 0.12);
      --mono: 'IBM Plex Mono', monospace;
      --sans: 'IBM Plex Sans', sans-serif;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--sans);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 48px 16px;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(20, 184, 166, 0.02) 1px, transparent 1px),
        linear-gradient(90deg, rgba(20, 184, 166, 0.02) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      position: relative;
      z-index: 1;
      width: 100%;
      max-width: 560px;
    }

    /* Nav */
    .nav {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
      margin-bottom: 32px;
    }

    .nav a {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 4px;
      border: 1.5px solid var(--border);
      color: var(--text-dim);
      transition: border-color 0.15s, color 0.15s;
    }

    .nav a:hover { color: var(--text); border-color: var(--text-dim); }
    .nav a.active { border-color: var(--accent); color: var(--accent); }

    /* Header */
    header { margin-bottom: 40px; }

    .header-label {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--accent);
      letter-spacing: 0.2em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }

    h1 {
      font-family: var(--mono);
      font-size: 28px;
      font-weight: 500;
      color: var(--text-bright);
      letter-spacing: -0.02em;
    }

    h1 span { color: var(--accent); }

    .subtitle {
      margin-top: 6px;
      font-size: 14px;
      font-weight: 300;
      color: var(--text-dim);
    }

    /* Input card */
    .input-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
      transition: border-color 0.2s;
    }

    .input-card:focus-within { border-color: var(--accent); }

    .input-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 12px;
    }

    .url-row {
      display: flex;
      gap: 10px;
    }

    .url-input {
      flex: 1;
      background: var(--bg);
      border: 1.5px solid var(--border);
      border-radius: 5px;
      color: var(--text);
      font-family: var(--mono);
      font-size: 13px;
      padding: 9px 12px;
      outline: none;
      transition: border-color 0.15s;
    }

    .url-input::placeholder { color: var(--text-dim); }
    .url-input:focus { border-color: var(--accent); }

    .btn-go {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: var(--accent);
      color: #000;
      border: none;
      border-radius: 5px;
      padding: 9px 18px;
      cursor: pointer;
      white-space: nowrap;
      transition: opacity 0.15s;
    }

    .btn-go:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Progress */
    .progress-section {
      display: none;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      margin-bottom: 16px;
    }

    .progress-section.visible { display: block; }

    .progress-stage { margin-bottom: 14px; }
    .progress-stage:last-child { margin-bottom: 0; }

    .stage-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 6px;
    }

    .stage-label {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: var(--text-dim);
    }

    .stage-label.active { color: var(--accent); }
    .stage-label.done   { color: var(--success); }

    .stage-pct {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    .progress-bar-track {
      height: 3px;
      background: var(--border);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      background: var(--accent);
      border-radius: 99px;
      width: 0%;
      transition: width 0.3s ease;
    }

    .stage-status {
      margin-top: 6px;
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    /* Result boxes */
    .result-box {
      display: none;
      border-radius: 8px;
      padding: 16px 20px;
      margin-bottom: 16px;
    }

    .result-box.error {
      display: block;
      background: var(--error-dim);
      border: 1.5px solid var(--error);
    }

    .result-title {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-bright);
      margin-bottom: 6px;
    }

    .result-msg {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.5;
    }

    /* Section label */
    .section-label {
      font-family: var(--mono);
      font-size: 10px;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 12px;
      margin-top: 32px;
    }

    /* Episode list */
    .episode-list { display: flex; flex-direction: column; gap: 10px; }

    .episode-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 14px 16px;
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .episode-thumb {
      width: 56px;
      height: 56px;
      border-radius: 4px;
      object-fit: cover;
      flex-shrink: 0;
      background: var(--border);
    }

    .episode-meta { flex: 1; min-width: 0; }

    .episode-title {
      font-family: var(--mono);
      font-size: 13px;
      font-weight: 500;
      color: var(--text-bright);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 4px;
    }

    .episode-duration {
      font-family: var(--mono);
      font-size: 11px;
      color: var(--text-dim);
    }

    .btn-remove {
      font-family: var(--mono);
      font-size: 11px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: none;
      border: 1.5px solid var(--border);
      border-radius: 4px;
      color: var(--text-dim);
      padding: 6px 10px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: border-color 0.15s, color 0.15s;
    }

    .btn-remove:hover { border-color: var(--error); color: var(--error); }

    .empty-state {
      font-family: var(--mono);
      font-size: 13px;
      color: var(--text-dim);
      padding: 20px 0;
    }

    /* Deploy section */
    .deploy-card {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 8px;
      padding: 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      flex-wrap: wrap;
    }

    .deploy-desc {
      font-size: 13px;
      color: var(--text-dim);
      line-height: 1.5;
    }

    .btn-deploy {
      font-family: var(--mono);
      font-size: 12px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      background: none;
      border: 1.5px solid var(--accent);
      border-radius: 5px;
      color: var(--accent);
      padding: 9px 18px;
      cursor: pointer;
      white-space: nowrap;
      flex-shrink: 0;
      transition: background 0.15s, color 0.15s;
    }

    .btn-deploy:hover { background: var(--accent-dim); }
    .btn-deploy:disabled { opacity: 0.4; cursor: not-allowed; }

    /* Deploy log */
    .deploy-log {
      font-family: var(--mono);
      font-size: 12px;
      color: var(--text-dim);
      line-height: 1.8;
      max-height: 240px;
      overflow-y: auto;
      padding-top: 8px;
    }

    .deploy-log .log-skip    { color: var(--text-dim); }
    .deploy-log .log-upload  { color: var(--accent); }
    .deploy-log .log-done    { color: var(--success); }
    .deploy-log .log-error   { color: var(--error); }
    .deploy-log .log-summary { color: var(--text-bright); margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
  </style>
</head>
<body>
  <div class="container">

    <nav class="nav">
      <a href="/">← Dashboard</a>
      <a href="/video.html">Video → MP3</a>
      <a href="/youtube.html">YouTube → MP3</a>
      <a href="/nba.html">NBA</a>
      <a href="/podcast.html" class="active">Podcast</a>
    </nav>

    <header>
      <div class="header-label">// pihole.local utility</div>
      <h1>pod<span>cast</span></h1>
      <p class="subtitle">Download YouTube audio and publish a podcast feed</p>
    </header>

    <!-- Add Episode -->
    <div class="input-card">
      <div class="input-label">Add Episode</div>
      <div class="url-row">
        <input class="url-input" id="urlInput" type="text" placeholder="https://www.youtube.com/watch?v=..." autocomplete="off" />
        <button class="btn-go" id="btnAdd">▶ Add</button>
      </div>
    </div>

    <div class="progress-section" id="addProgress">
      <div class="progress-stage">
        <div class="stage-header">
          <span class="stage-label" id="phaseLabel">Downloading</span>
          <span class="stage-pct" id="phasePct">0%</span>
        </div>
        <div class="progress-bar-track">
          <div class="progress-bar-fill" id="phaseBar" style="width:0%"></div>
        </div>
        <div class="stage-status" id="phaseStatus">Starting...</div>
      </div>
    </div>

    <div class="result-box" id="addError">
      <div class="result-title">✗ Failed</div>
      <div class="result-msg" id="addErrorMsg"></div>
    </div>

    <!-- Deploy -->
    <div class="section-label">Publish</div>
    <div class="deploy-card">
      <div class="deploy-desc">Upload feed.xml, thumbnails, and new MP3s to Cloudflare R2</div>
      <button class="btn-deploy" id="btnDeploy">↑ Deploy to R2</button>
    </div>

    <div class="progress-section" id="deployProgress">
      <div class="deploy-log" id="deployLog"></div>
    </div>

    <!-- Episode List -->
    <div class="section-label">Episodes</div>
    <div id="episodeList"><div class="empty-state">Loading...</div></div>

  </div>

  <script>
    // ─── Utilities ────────────────────────────────────────────────────────────

    function formatDuration(secs) {
      const h = Math.floor(secs / 3600);
      const m = Math.floor((secs % 3600) / 60);
      const s = secs % 60;
      return `${h}:${String(m).padStart(2, '0')}:${String(s).padStart(2, '0')}`;
    }

    // SSE-over-fetch: POST to url, stream data: events, call onEvent for each
    async function streamPost(url, body, onEvent) {
      let res;
      try {
        res = await fetch(url, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(body),
        });
      } catch (e) {
        onEvent({ type: 'error', message: `Network error: ${e.message}` });
        return;
      }

      const reader  = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const parts = buffer.split('\n\n');
        buffer = parts.pop(); // keep incomplete trailing chunk
        for (const part of parts) {
          const line = part.trim();
          if (line.startsWith('data: ')) {
            try { onEvent(JSON.parse(line.slice(6))); } catch {}
          }
        }
      }
    }

    // ─── Episode list ─────────────────────────────────────────────────────────

    function renderEpisodeCard(ep) {
      const dur = ep.durationSeconds ? formatDuration(ep.durationSeconds) : '—';
      const date = ep.pubDate
        ? new Date(ep.pubDate).toLocaleDateString('en-US', { year: 'numeric', month: 'short', day: 'numeric' })
        : '—';
      return `
        <div class="episode-card" data-id="${ep.id}">
          <img class="episode-thumb"
               src="/podcast/thumb/${ep.id}"
               alt=""
               onerror="this.style.display='none'" />
          <div class="episode-meta">
            <div class="episode-title" title="${ep.title.replace(/"/g, '&quot;')}">${ep.title}</div>
            <div class="episode-duration">${date} · ${dur}</div>
          </div>
          <button class="btn-remove" data-id="${ep.id}">Remove</button>
        </div>`;
    }

    function renderEpisodeList(episodes) {
      const el = document.getElementById('episodeList');
      if (!episodes.length) {
        el.innerHTML = '<div class="empty-state">No episodes yet. Add one above.</div>';
        return;
      }
      el.innerHTML = `<div class="episode-list">${episodes.map(renderEpisodeCard).join('')}</div>`;
    }

    async function loadEpisodes() {
      try {
        const res = await fetch('/podcast/episodes');
        const eps = await res.json();
        eps.sort((a, b) => new Date(b.pubDate) - new Date(a.pubDate));
        renderEpisodeList(eps);
      } catch (e) {
        document.getElementById('episodeList').innerHTML =
          `<div class="empty-state" style="color:var(--error)">Failed to load episodes: ${e.message}</div>`;
      }
    }

    // ─── Remove episode ───────────────────────────────────────────────────────

    async function handleRemove(id) {
      if (!confirm('Remove this episode? The local files will be deleted and the feed updated.')) return;
      try {
        const res = await fetch(`/podcast/episodes/${id}`, { method: 'DELETE' });
        if (!res.ok) {
          const data = await res.json();
          alert(`Remove failed: ${data.error || res.status}`);
          return;
        }
        loadEpisodes();
      } catch (e) {
        alert(`Network error: ${e.message}`);
      }
    }

    // Delegated click handler for remove buttons
    document.getElementById('episodeList').addEventListener('click', e => {
      const btn = e.target.closest('.btn-remove');
      if (btn) handleRemove(btn.dataset.id);
    });

    // ─── Add episode ──────────────────────────────────────────────────────────

    const urlInput   = document.getElementById('urlInput');
    const btnAdd     = document.getElementById('btnAdd');
    const addProgress = document.getElementById('addProgress');
    const phaseLabel  = document.getElementById('phaseLabel');
    const phasePct    = document.getElementById('phasePct');
    const phaseBar    = document.getElementById('phaseBar');
    const phaseStatus = document.getElementById('phaseStatus');
    const addError    = document.getElementById('addError');
    const addErrorMsg = document.getElementById('addErrorMsg');

    const phaseNames = {
      downloading: 'Downloading',
      extracting:  'Extracting audio',
      processing:  'Processing',
    };

    function resetAdd() {
      urlInput.disabled  = false;
      btnAdd.disabled    = false;
      addProgress.classList.remove('visible');
      addError.className = 'result-box';
      phaseBar.style.width = '0%';
      phasePct.textContent = '0%';
    }

    function showAddError(msg) {
      addError.className  = 'result-box error';
      addErrorMsg.textContent = msg;
    }

    async function handleAddEpisode() {
      const url = urlInput.value.trim();
      if (!url) return;

      resetAdd();
      urlInput.disabled = true;
      btnAdd.disabled   = true;
      addProgress.classList.add('visible');
      phaseLabel.textContent  = 'Downloading';
      phaseLabel.className    = 'stage-label active';
      phasePct.textContent    = '0%';
      phaseBar.style.width    = '0%';
      phaseStatus.textContent = 'Starting...';

      await streamPost('/podcast/episodes', { url }, event => {
        if (event.type === 'progress') {
          const label = phaseNames[event.phase] || event.phase;
          phaseLabel.textContent = label;
          phaseLabel.className   = 'stage-label active';

          if (event.pct !== undefined) {
            phasePct.textContent   = `${event.pct}%`;
            phaseBar.style.width   = `${event.pct}%`;
            phaseStatus.textContent = `${label}... ${event.pct}%`;
          } else {
            phaseBar.style.width    = '100%';
            phaseStatus.textContent = `${label}...`;
          }
        } else if (event.type === 'done') {
          phaseLabel.textContent  = 'Complete';
          phaseLabel.className    = 'stage-label done';
          phasePct.textContent    = '100%';
          phaseBar.style.width    = '100%';
          phaseStatus.textContent = `Added: ${event.episode.title}`;
          urlInput.value = '';
          loadEpisodes();
          setTimeout(resetAdd, 3000);
        } else if (event.type === 'error') {
          addProgress.classList.remove('visible');
          showAddError(event.message);
          urlInput.disabled = false;
          btnAdd.disabled   = false;
        }
      });
    }

    btnAdd.addEventListener('click', handleAddEpisode);
    urlInput.addEventListener('keydown', e => { if (e.key === 'Enter') btnAdd.click(); });

    // ─── Deploy ───────────────────────────────────────────────────────────────

    const btnDeploy      = document.getElementById('btnDeploy');
    const deployProgress = document.getElementById('deployProgress');
    const deployLog      = document.getElementById('deployLog');

    function appendLog(html) {
      deployLog.insertAdjacentHTML('beforeend', `<div>${html}</div>`);
      deployLog.scrollTop = deployLog.scrollHeight;
    }

    async function handleDeploy() {
      btnDeploy.disabled = true;
      deployLog.innerHTML = '';
      deployProgress.classList.add('visible');

      await streamPost('/podcast/deploy', {}, event => {
        if (event.type === 'progress') {
          if (event.phase === 'checking') {
            if (event.file) {
              appendLog(`<span class="log-skip">check  ${event.file}</span>`);
            }
          } else if (event.phase === 'uploading') {
            if (event.file) {
              appendLog(`<span class="log-upload">upload ${event.file}</span>`);
            }
          }
        } else if (event.type === 'done') {
          appendLog(`<div class="log-summary log-done">✓ Done — ${event.uploaded} uploaded, ${event.skipped} skipped</div>`);
          btnDeploy.disabled = false;
        } else if (event.type === 'error') {
          appendLog(`<span class="log-error">✗ ${event.message}</span>`);
          btnDeploy.disabled = false;
        }
      });
    }

    btnDeploy.addEventListener('click', handleDeploy);

    // ─── Init ─────────────────────────────────────────────────────────────────

    loadEpisodes();
  </script>
</body>
</html>
