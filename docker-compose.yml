services:
  # The NBA watchability scoring API - must be running before pi-utilities starts
  nba-api:
    # Image must be built manually from the NbaGameScoreApi repo before running compose:
    #   cd ../NbaGameScoreApi && docker build -t nba-game-score-api .
    image: nba-game-score-api:latest
    restart: unless-stopped

  pi-utilities:
    image: pi-utilities:latest
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NBA_API_URL=http://nba-api:8000
      - SHARED_DIR=/shared
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_PUBLIC_BASE_URL=${R2_PUBLIC_BASE_URL}
      - PODCAST_TITLE=${PODCAST_TITLE}
      - PODCAST_AUTHOR=${PODCAST_AUTHOR}
    volumes:
      - /home/pi/shared:/shared:ro
      - ./podcast:/app/podcast
    depends_on:
      - nba-api

networks:
  default:
    driver: bridge

