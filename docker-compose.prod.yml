# On production, pull the services from the GitHub Container Repository
services:
  nba-api:
    image: ghcr.io/yellowyak/nba-game-score-api:latest
  pi-utilities:
    image: ghcr.io/yellowyak/pi-utilities:latest
    environment:
      - SHARED_DIR=/shared
      - R2_ACCOUNT_ID=${R2_ACCOUNT_ID}
      - R2_ACCESS_KEY_ID=${R2_ACCESS_KEY_ID}
      - R2_SECRET_ACCESS_KEY=${R2_SECRET_ACCESS_KEY}
      - R2_BUCKET_NAME=${R2_BUCKET_NAME}
      - R2_PUBLIC_BASE_URL=${R2_PUBLIC_BASE_URL}
      - PODCAST_TITLE=${PODCAST_TITLE}
      - PODCAST_AUTHOR=${PODCAST_AUTHOR}
    volumes:
      - /home/pi/shared:/shared:ro
      - /home/pi/podcast:/app/podcast